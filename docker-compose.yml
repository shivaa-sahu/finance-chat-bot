version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deepfin
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./packages/backend
    env_file: .env.example
    depends_on: [db, redis, agent]
    ports: ["4000:4000"]
    volumes:
      - ./packages/backend:/usr/src/app
    command: ["npm","run","start:dev"]

  frontend:
    build: ./packages/frontend
    env_file: .env.example
    ports: ["3000:3000"]
    volumes:
      - ./packages/frontend:/usr/src/app
    depends_on: [backend]
    command: ["npm","run","dev"]

  agent:
    build: ./packages/agent
    env_file: .env.example
    ports: ["8000:8000"]
    volumes:
      - ./packages/agent:/usr/src/app
    command: ["uvicorn", "agent.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  db_data:
